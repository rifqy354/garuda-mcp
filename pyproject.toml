{
  "name": "bugbounty-mcp",
  "version": "0.1.0",
  "description": "A modern, modular MCP server for bug bounty hunting and security research",
  "authors": [{"name": "Your Name", "email": "you@example.com"}],
  "license": "MIT",
  "readme": "README.md",
  "requires-python": ">=3.11",
  "keywords": [
    "bug-bounty",
    "security",
    "mcp",
    "pentest",
    "recon",
    "vulnerability-scanner"
  ],
  "classifiers": [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Topic :: Security",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
  ],
  "dependencies": [
    "fastmcp>=0.1.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.25.0",
    "aiofiles>=23.0.0",
    "rich>=13.0.0",
    "typer>=0.9.0",
    "pyyaml>=6.0.0",
    "jinja2>=3.1.0",
    "playwright>=1.40.0",
  ],
  "optional-dependencies": {
    "dev": [
      "pytest>=7.4.0",
      "pytest-asyncio>=0.21.0",
      "ruff>=0.1.0",
      "mypy>=1.7.0",
      "pre-commit>=3.5.0",
    ],
    "burp": [
      "burp-rest-api>=2.0.0",
    ],
  },
  "scripts": {
    "server": "python -m bugbounty_mcp.server",
    "test": "pytest tests/ -v",
    "lint": "ruff check src/",
    "format": "ruff format src/",
    "typecheck": "mypy src/",
  },
  "entry_points": {
    "bugbounty-mcp": "bugbounty_mcp.cli:main",
  },
  "project.urls": {
    "Repository": "https://github.com/YOUR_USERNAME/bugbounty-mcp",
    "Documentation": "https://github.com/YOUR_USERNAME/bugbounty-mcp#readme",
  }
}
